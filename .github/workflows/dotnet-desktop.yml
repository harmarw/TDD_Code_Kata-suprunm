name: .NET Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "String Calculator/String Calculator.sln"

      - name: Build
        run: dotnet build "String Calculator/String Calculator.sln" --no-restore --configuration Release

      - name: Test
        run: dotnet test "String Calculator/String Calculator.sln" --no-build --configuration Release